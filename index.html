<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Canetas da Paz 🍁</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
  <style>
    :root {
      --bg: #0b1020;
      --bg-soft: #121a2f;
      --card: #151f37;
      --line: #26314f;
      --text: #f8fafc;
      --muted: #b7c0d8;
      --primary: #6d5dfc;
      --primary-2: #2dd4bf;
      --success: #22c55e;
      --danger: #ef4444;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Montserrat', sans-serif;
      color: var(--text);
      background: radial-gradient(800px 300px at 20% -20%, #302469, transparent),
                  radial-gradient(900px 300px at 100% -20%, #0b6f6d, transparent),
                  var(--bg);
      min-height: 100vh;
    }

    .container { max-width: 1200px; margin: 0 auto; padding: 0 16px; }

    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(11, 16, 32, 0.92);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--line);
    }

    .head {
      padding: 14px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .brand h1 { margin: 0; font-size: 1.2rem; font-weight: 800; }
    .brand p { margin: 4px 0 0; font-size: .85rem; color: var(--muted); }

    .btn {
      border: 1px solid var(--line);
      background: var(--bg-soft);
      color: var(--text);
      border-radius: 10px;
      padding: 10px 12px;
      cursor: pointer;
      font-weight: 700;
    }

    .filters {
      display: grid;
      grid-template-columns: 1.4fr 1fr 1fr;
      gap: 10px;
      padding: 0 0 14px;
    }

    .input, select {
      width: 100%;
      border: 1px solid var(--line);
      background: var(--bg-soft);
      color: var(--text);
      border-radius: 10px;
      padding: 11px 12px;
      font-family: inherit;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 10px;
    }

    .chip {
      border: 1px solid var(--line);
      color: var(--muted);
      background: var(--bg-soft);
      border-radius: 999px;
      padding: 8px 12px;
      font-size: .74rem;
      font-weight: 700;
      text-transform: uppercase;
      cursor: pointer;
    }

    .chip.active {
      color: #fff;
      border-color: transparent;
      background: linear-gradient(135deg, var(--primary), var(--primary-2));
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin: 18px 0;
    }

    .stat {
      border: 1px solid var(--line);
      background: rgba(21, 31, 55, 0.8);
      border-radius: 14px;
      padding: 12px;
    }

    .stat small { color: var(--muted); display: block; margin-bottom: 6px; }
    .stat strong { font-size: 1.05rem; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 12px;
      padding-bottom: 100px;
    }

    .card {
      border: 1px solid var(--line);
      background: rgba(21, 31, 55, 0.86);
      border-radius: 16px;
      overflow: hidden;
      transition: transform .2s;
      display: flex;
      flex-direction: column;
    }

    .card:hover { transform: translateY(-4px); }

    .card-image { position: relative; height: 160px; }
    .card-image img { width: 100%; height: 100%; object-fit: cover; display: block; }

    .badge {
      position: absolute;
      left: 8px;
      top: 8px;
      background: rgba(0,0,0,0.65);
      color: #fff;
      border-radius: 999px;
      font-size: .7rem;
      font-weight: 700;
      padding: 5px 8px;
    }

    .fav {
      position: absolute;
      right: 8px;
      top: 8px;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,.2);
      background: rgba(0,0,0,.55);
      color: #fff;
      cursor: pointer;
    }

    .fav.active { color: #ff5f8d; }

    .card-body { padding: 10px; display: flex; flex-direction: column; gap: 8px; flex: 1; }
    .title { min-height: 40px; font-size: .92rem; font-weight: 700; line-height: 1.35; }
    .desc { color: var(--muted); font-size: .8rem; min-height: 36px; }
    .line { display: flex; align-items: center; justify-content: space-between; }
    .price { font-size: 1rem; font-weight: 800; }

    .btn-add {
      border: none;
      background: linear-gradient(135deg, var(--primary), var(--primary-2));
      color: #fff;
      border-radius: 10px;
      padding: 8px 10px;
      font-weight: 700;
      cursor: pointer;
    }

    .empty {
      border: 1px dashed var(--line);
      border-radius: 14px;
      text-align: center;
      color: var(--muted);
      padding: 28px;
      grid-column: 1 / -1;
    }

    .cart-float {
      position: fixed;
      right: 16px;
      bottom: 16px;
      z-index: 120;
      width: 62px;
      height: 62px;
      border-radius: 50%;
      border: 0;
      background: #111827;
      color: #fff;
      box-shadow: 0 14px 28px rgba(0,0,0,.35);
      cursor: pointer;
      font-size: 1.1rem;
    }

    .cart-count {
      position: absolute;
      top: -4px;
      right: -4px;
      width: 22px;
      height: 22px;
      background: var(--danger);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: .72rem;
      font-weight: 700;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.65);
      z-index: 140;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .overlay.open { display: flex; }

    .modal {
      width: min(560px, 100%);
      border: 1px solid var(--line);
      background: #0f172a;
      border-radius: 16px;
      overflow: hidden;
    }

    .modal-head, .modal-body, .modal-foot { padding: 14px; }
    .modal-head { border-bottom: 1px solid var(--line); display: flex; justify-content: space-between; align-items: center; }
    .modal-body { max-height: 56vh; overflow-y: auto; }
    .cart-item { display: grid; grid-template-columns: 1fr auto auto; gap: 8px; align-items: center; border-bottom: 1px dashed var(--line); padding: 8px 0; }
    .qty-btn { border: 1px solid var(--line); background: var(--bg-soft); color: #fff; border-radius: 8px; width: 30px; height: 30px; cursor: pointer; }

    .btn-whats {
      width: 100%;
      border: 0;
      border-radius: 10px;
      padding: 12px;
      background: var(--success);
      color: #05210e;
      font-weight: 800;
      cursor: pointer;
    }

    .toast {
      position: fixed;
      left: 50%;
      transform: translateX(-50%);
      bottom: 16px;
      background: #111827;
      color: #fff;
      border: 1px solid #2d3a5d;
      border-radius: 999px;
      padding: 10px 14px;
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s;
      z-index: 200;
    }

    .toast.show { opacity: 1; }

    @media (max-width: 860px) {
      .filters { grid-template-columns: 1fr; }
      .stats { grid-template-columns: repeat(2, 1fr); }
      .brand p { display: none; }
    }
  </style>
</head>
<body>
  <header>
    <div class="container">
      <div class="head">
        <div class="brand">
          <h1>Canetas da Paz 🍁</h1>
          <p>Visual novo, filtros rápidos e fechamento direto no WhatsApp.</p>
        </div>
        <div>
          <button class="btn" id="favModeBtn"><i class="fa-regular fa-heart"></i> Favoritos</button>
        </div>
      </div>

      <div class="filters">
        <input class="input" id="searchInput" placeholder="Buscar por nome, categoria ou sabor...">
        <select id="sortSelect">
          <option value="relevance">Ordenar: Relevância</option>
          <option value="price_asc">Menor preço</option>
          <option value="price_desc">Maior preço</option>
          <option value="name">Nome (A-Z)</option>
        </select>
        <input class="input" type="number" id="maxPriceInput" min="0" placeholder="Preço máximo (R$)">
      </div>

      <div class="chips" id="chips"></div>
    </div>
  </header>

  <main class="container">
    <section class="stats" id="stats"></section>
    <section class="grid" id="productGrid"></section>
  </main>

  <button class="cart-float" id="openCartBtn" aria-label="Abrir carrinho">
    <i class="fa-solid fa-cart-shopping"></i>
    <span class="cart-count" id="cartCount">0</span>
  </button>

  <div class="overlay" id="cartOverlay">
    <div class="modal">
      <div class="modal-head">
        <strong>Seu carrinho</strong>
        <button class="btn" id="closeCartBtn">Fechar</button>
      </div>
      <div class="modal-body" id="cartBody"></div>
      <div class="modal-foot">
        <p><strong>Total:</strong> <span id="cartTotal">R$ 0,00</span></p>
        <button class="btn-whats" id="checkoutBtn"><i class="fa-brands fa-whatsapp"></i> Finalizar no WhatsApp</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast">Produto adicionado!</div>

  <script>
    const WHATSAPP_NUMBER = '5599999999999';

    const products = [
      { id: 1, name: 'Hallu Strawberry Cheesecake 3.0', category: 'pod', subtype: 'indica', price: 300, flavor: 'morango', image: 'https://i.postimg.cc/8c7pqBGZ/IMG_2593.jpg', desc: 'Descartável com perfil doce e cremoso.' },
      { id: 2, name: 'Hallu Skywalker OG 3.0', category: 'pod', subtype: 'indica', price: 300, flavor: 'terroso', image: 'https://i.postimg.cc/XqrjTcWh/IMG_2592.jpg', desc: 'Clássico intenso para relaxamento.' },
      { id: 3, name: 'Hallu Sour Diesel 3.0', category: 'pod', subtype: 'hibrida', price: 300, flavor: 'diesel', image: 'https://i.postimg.cc/rsDVvCTP/IMG_2594.jpg', desc: 'Aroma marcante e efeito energético.' },
      { id: 4, name: 'Hallu White Fire OG 10g', category: 'pod', subtype: 'sativa', price: 450, flavor: 'herbal', image: 'https://i.postimg.cc/RhWSjQmb/IMG_2591.jpg', desc: 'Tank 10g para maior duração.' },
      { id: 5, name: 'Hallu Purple Haze 3.0', category: 'pod', subtype: 'sativa', price: 300, flavor: 'uva', image: 'https://i.postimg.cc/Kj1Gdrb6/IMG_2596.jpg', desc: 'Perfil adocicado com euforia mental.' },
      { id: 6, name: 'Hallu Blackberry Moonrocks 10g', category: 'pod', subtype: 'sativa', price: 450, flavor: 'amora', image: 'https://i.postimg.cc/j2DxGQTh/IMG_2589.jpg', desc: 'Sabor frutado e potência extra.' },
      { id: 7, name: 'Jeeter Blueberry Tornado', category: 'hibrida', subtype: 'hibrida', price: 190, flavor: 'mirtilo', image: 'https://i.postimg.cc/5N6PHXLL/56ce0c76-fadd-4a2e-9570-00e1d48d943b.jpg', desc: 'Mistura potente e muito aromática.' },
      { id: 8, name: 'Jeeter Cherry Punch', category: 'hibrida', subtype: 'hibrida', price: 190, flavor: 'cereja', image: 'https://i.postimg.cc/qMxy1jkr/IMG-2553.jpg', desc: 'Doce com notas terrosas.' },
      { id: 9, name: 'Jeeter Kush Mintz', category: 'hibrida', subtype: 'indica', price: 190, flavor: 'menta', image: 'https://i.postimg.cc/904Z8hQ5/IMG-2555.jpg', desc: 'Refrescante com final denso.' },
      { id: 10, name: 'Refil Citrus Blast', category: 'refil', subtype: 'sativa', price: 130, flavor: 'cítrico', image: 'https://images.unsplash.com/photo-1631545806522-f87443d4b364?auto=format&fit=crop&w=800&q=60', desc: 'Reposição com perfil cítrico.' },
      { id: 11, name: 'Óleo Premium 1ml', category: 'oleo', subtype: 'indica', price: 160, flavor: 'natural', image: 'https://images.unsplash.com/photo-1615485737571-27f4f1f76cf0?auto=format&fit=crop&w=800&q=60', desc: 'Concentrado com alta pureza.' },
      { id: 12, name: 'Caneta Sativa Gold', category: 'sativa', subtype: 'sativa', price: 210, flavor: 'limão', image: 'https://images.unsplash.com/photo-1609519426886-cfcb6d6f56be?auto=format&fit=crop&w=800&q=60', desc: 'Opção leve para uso diurno.' }
    ];

    const state = {
      query: '',
      category: 'todos',
      sort: 'relevance',
      maxPrice: null,
      onlyFavorites: false,
      cart: JSON.parse(localStorage.getItem('cart') || '{}'),
      favorites: JSON.parse(localStorage.getItem('favorites') || '[]')
    };

    const currency = (value) => value.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });

    const chips = document.getElementById('chips');
    const grid = document.getElementById('productGrid');
    const stats = document.getElementById('stats');
    const toast = document.getElementById('toast');

    const categories = ['todos', ...new Set(products.map(p => p.category))];
    chips.innerHTML = categories.map(cat => `<button class="chip ${cat === 'todos' ? 'active' : ''}" data-cat="${cat}">${cat}</button>`).join('');

    function saveLocal() {
      localStorage.setItem('cart', JSON.stringify(state.cart));
      localStorage.setItem('favorites', JSON.stringify(state.favorites));
    }

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 1400);
    }

    function getFilteredProducts() {
      const q = state.query.toLowerCase().trim();

      const result = products.filter(product => {
        const byText = !q || `${product.name} ${product.category} ${product.flavor} ${product.subtype}`.toLowerCase().includes(q);
        const byCategory = state.category === 'todos' || product.category === state.category;
        const byPrice = state.maxPrice == null || product.price <= state.maxPrice;
        const byFav = !state.onlyFavorites || state.favorites.includes(product.id);
        return byText && byCategory && byPrice && byFav;
      });

      if (state.sort === 'price_asc') result.sort((a, b) => a.price - b.price);
      if (state.sort === 'price_desc') result.sort((a, b) => b.price - a.price);
      if (state.sort === 'name') result.sort((a, b) => a.name.localeCompare(b.name));

      return result;
    }

    function updateStats(list) {
      const cartCount = Object.values(state.cart).reduce((sum, qty) => sum + qty, 0);
      const min = list.length ? Math.min(...list.map(p => p.price)) : 0;
      const max = list.length ? Math.max(...list.map(p => p.price)) : 0;
      const average = list.length ? list.reduce((sum, p) => sum + p.price, 0) / list.length : 0;

      stats.innerHTML = `
        <article class="stat"><small>Itens visíveis</small><strong>${list.length}</strong></article>
        <article class="stat"><small>Faixa de preço</small><strong>${currency(min)} - ${currency(max)}</strong></article>
        <article class="stat"><small>Preço médio</small><strong>${currency(average)}</strong></article>
        <article class="stat"><small>No carrinho</small><strong>${cartCount}</strong></article>
      `;

      document.getElementById('cartCount').textContent = cartCount;
    }

    function renderProducts() {
      const list = getFilteredProducts();
      updateStats(list);

      if (!list.length) {
        grid.innerHTML = '<div class="empty">Nenhum produto encontrado com os filtros atuais.</div>';
        return;
      }

      grid.innerHTML = list.map(product => {
        const favoriteClass = state.favorites.includes(product.id) ? 'active' : '';

        return `
          <article class="card">
            <div class="card-image">
              <img src="${product.image}" alt="${product.name}" loading="lazy">
              <span class="badge">${product.category}</span>
              <button class="fav ${favoriteClass}" data-fav="${product.id}" aria-label="Favoritar">
                <i class="fa-solid fa-heart"></i>
              </button>
            </div>
            <div class="card-body">
              <div class="title">${product.name}</div>
              <div class="desc">${product.desc}</div>
              <div class="line">
                <div class="price">${currency(product.price)}</div>
                <button class="btn-add" data-add="${product.id}"><i class="fa-solid fa-cart-plus"></i> Add</button>
              </div>
            </div>
          </article>
        `;
      }).join('');
    }

    function addToCart(productId) {
      state.cart[productId] = (state.cart[productId] || 0) + 1;
      saveLocal();
      renderProducts();
      showToast('Adicionado ao carrinho');
    }

    function toggleFavorite(productId) {
      if (state.favorites.includes(productId)) {
        state.favorites = state.favorites.filter(id => id !== productId);
      } else {
        state.favorites.push(productId);
      }

      saveLocal();
      renderProducts();
    }

    function renderCart() {
      const cartBody = document.getElementById('cartBody');
      const cartTotal = document.getElementById('cartTotal');
      const ids = Object.keys(state.cart).map(Number).filter(id => state.cart[id] > 0);

      if (!ids.length) {
        cartBody.innerHTML = '<p style="color: var(--muted);">Seu carrinho está vazio.</p>';
        cartTotal.textContent = currency(0);
        return;
      }

      let total = 0;
      cartBody.innerHTML = ids.map(id => {
        const product = products.find(p => p.id === id);
        const qty = state.cart[id];
        const subtotal = product.price * qty;
        total += subtotal;

        return `
          <div class="cart-item">
            <div>
              <strong>${product.name}</strong><br>
              <small>${qty} x ${currency(product.price)}</small>
            </div>
            <div>
              <button class="qty-btn" data-dec="${id}">-</button>
              <button class="qty-btn" data-inc="${id}">+</button>
            </div>
            <strong>${currency(subtotal)}</strong>
          </div>
        `;
      }).join('');

      cartTotal.textContent = currency(total);
    }

    function checkout() {
      const ids = Object.keys(state.cart).map(Number).filter(id => state.cart[id] > 0);

      if (!ids.length) {
        showToast('Adicione itens antes de finalizar');
        return;
      }

      const messageLines = ids.map((id, index) => {
        const product = products.find(p => p.id === id);
        return `${index + 1}. ${product.name} x${state.cart[id]} (${currency(product.price * state.cart[id])})`;
      });

      const total = ids.reduce((sum, id) => {
        const product = products.find(p => p.id === id);
        return sum + product.price * state.cart[id];
      }, 0);

      const text = `Olá! Quero fazer um pedido:%0A${messageLines.join('%0A')}%0A%0ATotal: ${currency(total)}`;
      window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(text)}`, '_blank');
    }

    document.getElementById('searchInput').addEventListener('input', (event) => {
      state.query = event.target.value;
      renderProducts();
    });

    document.getElementById('sortSelect').addEventListener('change', (event) => {
      state.sort = event.target.value;
      renderProducts();
    });

    document.getElementById('maxPriceInput').addEventListener('input', (event) => {
      const value = Number(event.target.value);
      state.maxPrice = value > 0 ? value : null;
      renderProducts();
    });

    chips.addEventListener('click', (event) => {
      const button = event.target.closest('[data-cat]');
      if (!button) return;

      state.category = button.dataset.cat;
      document.querySelectorAll('.chip').forEach(chip => chip.classList.toggle('active', chip === button));
      renderProducts();
    });

    grid.addEventListener('click', (event) => {
      const addButton = event.target.closest('[data-add]');
      const favButton = event.target.closest('[data-fav]');

      if (addButton) addToCart(Number(addButton.dataset.add));
      if (favButton) toggleFavorite(Number(favButton.dataset.fav));
    });

    document.getElementById('favModeBtn').addEventListener('click', () => {
      state.onlyFavorites = !state.onlyFavorites;
      const button = document.getElementById('favModeBtn');
      button.style.borderColor = state.onlyFavorites ? '#ff5f8d' : 'var(--line)';
      renderProducts();
    });

    document.getElementById('openCartBtn').addEventListener('click', () => {
      renderCart();
      document.getElementById('cartOverlay').classList.add('open');
    });

    document.getElementById('closeCartBtn').addEventListener('click', () => {
      document.getElementById('cartOverlay').classList.remove('open');
    });

    document.getElementById('cartOverlay').addEventListener('click', (event) => {
      if (event.target.id === 'cartOverlay') {
        document.getElementById('cartOverlay').classList.remove('open');
      }
    });

    document.getElementById('cartBody').addEventListener('click', (event) => {
      const incButton = event.target.closest('[data-inc]');
      const decButton = event.target.closest('[data-dec]');

      if (incButton) {
        const id = incButton.dataset.inc;
        state.cart[id] = (state.cart[id] || 0) + 1;
      }

      if (decButton) {
        const id = decButton.dataset.dec;
        state.cart[id] = Math.max((state.cart[id] || 0) - 1, 0);
        if (!state.cart[id]) delete state.cart[id];
      }

      saveLocal();
      renderProducts();
      renderCart();
    });

    document.getElementById('checkoutBtn').addEventListener('click', checkout);

    renderProducts();
  </script>
</body>
</html>
